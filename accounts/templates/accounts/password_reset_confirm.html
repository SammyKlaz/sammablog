{% extends 'base.html' %}

{% block title %}
Create New Password
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Create New Password</h2>

    <p>
        Enter your new password below.
    </p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Change Password
        </button>

    </form>

</div>

{% endblock %}
