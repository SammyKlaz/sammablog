{% extends 'base.html' %}

{% block title %}
Password Reset Complete
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Password Successfully Changed</h2>

    <p>
        Your password has been updated successfully.
    </p>

    <p>
        You can now log in using your new password.
    </p>

    <a
        class="profile-btn"
        href="{% url 'login' %}"
    >
        Go to Login
    </a>

</div>

{% endblock %}
