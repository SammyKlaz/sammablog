{% extends 'base.html' %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Reset Password</h2>

    <p>
        Enter the email address associated with your account.
        We will send you a link to reset your password.
    </p>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Send Reset Link
        </button>

    </form>

</div>

{% endblock %}
