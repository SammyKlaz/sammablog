{% extends 'base.html' %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Edit Profile</h2>

    {% if request.user.profile.profile_picture %}

        <img
            class="edit-profile-image"
            src="{{ request.user.profile.profile_picture.url }}"
            alt="{{ request.user.username }}"
        >

    {% endif %}

   <form
    method="POST"
    enctype="multipart/form-data"
>

    {% csrf_token %}

    <p>

        <label for="{{ form.bio.id_for_label }}">
            Bio
        </label>

        {{ form.bio }}

    </p>

    <p>

        <label>
            Profile Picture
        </label>

     <input
    type="file"
    name="profile_picture"
    id="id_profile_picture"
>

    </p>

    <button type="submit">
        Save Changes
    </button>

</form>
</div>

{% endblock %}
