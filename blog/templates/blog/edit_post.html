{% extends 'base.html' %}

{% block title %}
Edit Post
{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Edit Post</h2>

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

        {% if post.image %}
            <img
                src="{{ post.image.url }}"
                alt="{{ post.title }}"
                class="edit-post-image"
            >
        {% endif %}

        <p>
            <label>Title</label>
            {{ form.title }}
        </p>

        <p>
            <label>Image</label>
            {{ form.image }}
        </p>

        <p>
            <label>Body</label>
            {{ form.body }}
        </p>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

<p class="back-link">
    <a href="{% url 'profile' %}">
        Back to Profile
    </a>
</p>

{% endblock %}
